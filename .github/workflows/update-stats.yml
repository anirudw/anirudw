name: Update GitHub Profile Stats

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual triggers
  push:
    branches:
      - main

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROFILE_README_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests python-dateutil lxml
      
      - name: Run stats collector
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          PROFILE_README_TOKEN: ${{ secrets.PROFILE_README_TOKEN }}
        run: |
          python today.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dark_mode.svg light_mode.svg cache/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GitHub statistics [skip ci]" && git push)
