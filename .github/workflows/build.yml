name: Update GitHub Profile

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this manually for testing

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Update profile SVG
        env:
          # This maps your GitHub Secret (PROFILE_UPDATE) 
          # to the name your script expects (GITHUB_TOKEN)
          GITHUB_TOKEN: ${{ secrets.PROFILE_UPDATE }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python update_profile.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          # Only commit if the SVG or cache files actually changed
          git diff --staged --quiet || (git commit -m "chore: update profile stats" && git push)