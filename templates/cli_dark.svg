<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#010409"/>
    </linearGradient>
  </defs>

  <rect width="800" height="350" fill="url(#bg)" rx="10" />
  <rect x="0.5" y="0.5" width="799" height="349" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <path d="M0 10C0 4.47715 4.47715 0 10 0H790C795.523 0 800 4.47715 800 10V35H0V10Z" fill="#161b22"/>
  
  <text x="400" y="22" font-family="Consolas, monospace" font-size="12" fill="#8b949e" text-anchor="middle">anirudw — zsh — 80×24</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="14">
    
    <text x="25" y="70" fill="#58a6ff" font-weight="bold">❯</text>
    <text x="45" y="70" fill="#c9d1d9">whoami</text>
    
    <text x="45" y="95" fill="#8b949e">Computer Science student at CET, Kerala.</text>
    <text x="45" y="115" fill="#8b949e">Data Science | Machine Learning | Open Source</text>

    <text x="25" y="155" fill="#58a6ff" font-weight="bold">❯</text>
    <text x="45" y="155" fill="#c9d1d9">fetch-stats --github</text>

    <g transform="translate(45, 185)">
      <text x="0" y="0" fill="#c9d1d9">Commits:</text>
      <text id="stat_commits" x="120" y="0" fill="#ff7b72" font-weight="bold">---</text>
      
      <text x="0" y="25" fill="#c9d1d9">Repositories:</text>
      <text id="stat_repos" x="120" y="25" fill="#f2cc60" font-weight="bold">---</text>
      
      <text x="0" y="50" fill="#c9d1d9">Stars earned:</text>
      <text id="stat_stars" x="120" y="50" fill="#79c0ff" font-weight="bold">---</text>
    </g>

    <text x="25" y="285" fill="#58a6ff" font-weight="bold">❯</text>
    <rect x="45" y="272" width="8" height="16" fill="#c9d1d9">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>